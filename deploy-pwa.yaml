# LlamaEdge Chat PWA - Akash Network Deployment SDL
# Self-host the PWA on decentralized cloud infrastructure
# 
# Usage:
#   akash tx deployment create deploy-pwa.yaml --from <key-name>
#   akash create lease --dseq <dseq> --from <key-name>
#   akash send-manifest deploy-pwa.yaml --dseq <dseq> --provider <provider> --from <key-name>
#
# Or use Akash Console: https://console.akash.network

---
version: "2.0"

services:
  web:
    image: nginx:alpine
    env:
      - NGINX_PORT=80
    expose:
      - port: 80
        as: 80
        to:
          - global: true
        proto: tcp
    params:
      storage:
        data:
          mount: /usr/share/nginx/html
          source:
            upload:
              - src: ./index.html
                dest: /usr/share/nginx/html/index.html
              - src: ./manifest.json
                dest: /usr/share/nginx/html/manifest.json
              - src: ./sw.js
                dest: /usr/share/nginx/html/sw.js
              - src: ./css
                dest: /usr/share/nginx/html/css
              - src: ./js
                dest: /usr/share/nginx/html/js
              - src: ./icons
                dest: /usr/share/nginx/html/icons
              - src: ./nginx.conf
                dest: /etc/nginx/conf.d/default.conf

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.1
        memory:
          size: 128Mi
        storage:
          size: 256Mi
      placement:
        akash:
          attributes:
            hosting: true
          signedBy:
            anyOf:
              - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
          pricing:
            web:
              denom: uakt
              amount: 100

  placement:
    akash:
      attributes:
        akash.network/hosting: "true"
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
      pricing:
        web:
          denom: uakt
          amount: 100

deployment:
  web:
    akash:
      profile: web
      count: 1
